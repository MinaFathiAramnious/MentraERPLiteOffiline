<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - MentraERPLite</title>
    <link rel="icon" href="assets/img/smalicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="assets/js/db-init.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: #f1f5f9;
            overflow: hidden; 
        }
        .login-card { 
            animation: slideUp 0.5s ease-out;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="root" class="w-full max-w-md"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, className = "" }) => {
        const iconRef = useRef(null);
        useEffect(() => {
            if (iconRef.current) {
                iconRef.current.innerHTML = ''; 
                const iconElement = document.createElement('i');
                iconElement.setAttribute('data-lucide', name);
                iconElement.className = className;
                iconRef.current.appendChild(iconElement);
                lucide.createIcons();
            }
        }, [name, className]);
        return <span ref={iconRef} className="inline-flex"></span>;
    };

    const LoginPage = () => {
        const [formData, setFormData] = useState({ username: '', password: '' });
        const [error, setError] = useState('');
        const [loading, setLoading] = useState(false);

        // 1. فحص إذا كان المستخدم مسجل دخول بالفعل لمنع الدوران في حلقة مفرغة
        useEffect(() => {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                window.location.replace('dashboard.html');
            }
        }, []);

        // 2. بذر المستخدم الافتراضي
        useEffect(() => {
            const seedUser = async () => {
                const count = await db.local_users.count();
                if (count === 0) {
                    await db.local_users.add({
                        username: 'admin',
                        password: '123',
                        full_name: 'المدير العام',
                        role: 'admin'
                    });
                }
            };
            seedUser();
        }, []);

        const handleSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            setError('');

            try {
                // البحث عن المستخدم (Case Insensitive)
                const user = await db.local_users
                    .where('username')
                    .equalsIgnoreCase(formData.username)
                    .first();

                if (user && user.password === formData.password) {
                    // حفظ الجلسة وانتظار اكتمال العملية (مهم جداً)
                    await db.active_session.clear(); // مسح أي جلسة قديمة
                    await db.active_session.add({
                        id: 1,
                        user_id: user.id,
                        login_time: new Date().toISOString()
                    });

                    // تحديث الـ LocalStorage
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userName', user.full_name);
                    localStorage.setItem('userRole', user.role);

                    // توجيه نهائي مع "تبديل" المسار لضمان عدم العودة
                    setTimeout(() => {
                        window.location.replace('dashboard.html');
                    }, 500);

                } else {
                    setError('خطأ في اسم المستخدم أو كلمة المرور');
                    setLoading(false);
                }
            } catch (err) {
                setError('فشل الاتصال بقاعدة البيانات المحلية');
                setLoading(false);
            }
        };

        return (
            <div className="login-card bg-white rounded-[2rem] p-8 border border-gray-100">
                <div className="text-center mb-8">
                    <div className="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                        <Icon name="layout-dashboard" className="text-white w-8 h-8" />
                    </div>
                    <h1 className="text-2xl font-black text-gray-800">MentraERPLite</h1>
                    <p className="text-gray-400 text-sm mt-1 font-bold">تسجيل الدخول للنظام المحلي</p>
                </div>

                {error && (
                    <div className="bg-red-50 text-red-600 p-3 rounded-xl mb-6 text-sm font-bold flex items-center gap-2 border-r-4 border-red-500">
                        <Icon name="alert-circle" className="w-4 h-4" />
                        {error}
                    </div>
                )}

                <form onSubmit={handleSubmit} className="space-y-4">
                    <div className="space-y-1">
                        <label className="text-xs font-bold text-gray-500 mr-2">اسم المستخدم</label>
                        <input 
                            name="username" 
                            type="text" 
                            required 
                            className="w-full px-5 py-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none transition-all font-bold"
                            placeholder="admin"
                            onChange={(e) => setFormData({...formData, username: e.target.value})}
                        />
                    </div>

                    <div className="space-y-1">
                        <label className="text-xs font-bold text-gray-500 mr-2">كلمة المرور</label>
                        <input 
                            name="password" 
                            type="password" 
                            required 
                            className="w-full px-5 py-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none transition-all font-bold"
                            placeholder="123"
                            onChange={(e) => setFormData({...formData, password: e.target.value})}
                        />
                    </div>

                    <button 
                        type="submit" 
                        disabled={loading}
                        className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-lg shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-2 disabled:opacity-50"
                    >
                        {loading ? 'جاري التحقق...' : (
                            <>
                                <span>دخول</span>
                                <Icon name="log-in" className="w-5 h-5" />
                            </>
                        )}
                    </button>
                </form>

                <div className="mt-8 text-center pt-6 border-t border-gray-50">
                    <a href="subscriptions.html" className="text-blue-600 font-bold text-sm hover:underline">
                        ليس لديك حساب؟ إنشاء حساب جديد
                    </a>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LoginPage />);
</script>

</body>
</html>
