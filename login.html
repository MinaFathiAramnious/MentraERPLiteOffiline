<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- إعدادات الشاشة لمنع الزووم العشوائي في الأندرويد وتحسين تجربة اللمس -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#2563eb"> <!-- تلوين شريط الأندرويد باللون الأزرق -->
    
    <title>تسجيل الدخول - Mentra Lite</title>
    <link rel="icon" href="assets/img/smalicon.png">
    <link rel="manifest" href="manifest.json">
    <!-- تحميل Tailwind و FontAwesome (نفس المستخدم في باقي المشروع) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- تحميل قاعدة البيانات -->
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    <script src="assets/js/db-init.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: #f8fafc;
            /* منع تأثيرات السحب للموبايل */
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }
        .login-card { 
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-[100dvh] p-4 bg-slate-50">

    <div class="login-card w-full max-w-md bg-white rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-8 border border-slate-100">
        
        <!-- الهيدر واللوجو -->
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <i class="fas fa-fingerprint text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Mentra Lite</h1>
            <p class="text-slate-400 text-[11px] md:text-xs mt-2 font-black uppercase tracking-widest">تسجيل الدخول للنظام المحلي</p>
        </div>

        <!-- رسالة الخطأ (مخفية افتراضياً) -->
        <div id="error-message" class="hidden bg-rose-50 text-rose-600 p-4 rounded-2xl mb-6 text-sm font-black flex items-center gap-3 border border-rose-100 transition-all">
            <i class="fas fa-exclamation-circle text-lg"></i>
            <span id="error-text">حدث خطأ</span>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <form id="login-form" class="space-y-4 md:space-y-5">
            
            <div class="space-y-1.5">
                <label class="text-[11px] md:text-xs font-black text-slate-500 mr-2 block">اسم المستخدم أو رقم التواصل</label>
                <div class="relative">
                    <i class="fas fa-user absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <!-- text-[16px] لمنع عمل Zoom في الأندرويد والآيفون -->
                    <input 
                        id="identifier" 
                        type="text" 
                        required 
                        class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-3.5 md:py-4 pr-11 pl-4 font-bold text-slate-700 text-[16px] outline-none transition-all text-right"
                        placeholder="أدخل الاسم أو رقم الموبايل"
                    />
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] md:text-xs font-black text-slate-500 mr-2 block">كلمة المرور</label>
                <div class="relative">
                    <i class="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input 
                        id="password" 
                        type="password" 
                        required 
                        class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-3.5 md:py-4 pr-11 pl-4 font-bold text-slate-700 text-[16px] outline-none transition-all text-left"
                        placeholder="••••••••"
                        dir="ltr"
                    />
                </div>
            </div>

            <button 
                id="submit-btn"
                type="submit" 
                class="w-full py-4 md:py-5 mt-2 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-base md:text-lg shadow-xl shadow-blue-200 transition-all flex items-center justify-center gap-3 active:scale-95"
            >
                <span id="btn-text">دخول للنظام</span>
                <i id="btn-icon" class="fas fa-arrow-left"></i>
            </button>
        </form>

        <div class="mt-8 text-center pt-6 border-t border-slate-100">
            <a href="subscriptions.html" class="text-blue-600 font-bold text-sm md:text-base hover:text-blue-800 transition-colors">
                ليس لديك حساب؟ إعداد النظام
            </a>
        </div>
    </div>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .then(registration => {
                    console.log('Service Worker تم تفعيله بنجاح:', registration.scope);
                })
                .catch(error => {
                    console.log('فشل تفعيل Service Worker:', error);
                });
        });
    }
</script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            
            // 1. فحص الجلسة (توجيه سريع)
            if (localStorage.getItem('isLoggedIn') === 'true') {
                window.location.replace('dashboard.html');
                return;
            }

            // 2. إنشاء مستخدم افتراضي إذا كانت القاعدة فارغة (تم إضافة رقم الموبايل للتجربة)
            try {
                const count = await db.local_users.count();
                if (count === 0) {
                    await db.local_users.add({
                        username: 'admin',
                        phone: '01000000000', // رقم افتراضي
                        password: '123',
                        full_name: 'المدير العام',
                        role: 'admin'
                    });
                }
            } catch (e) {
                console.error("DB Initialization Error", e);
            }

            // 3. معالجة نموذج تسجيل الدخول
            const form = document.getElementById('login-form');
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // إظهار حالة التحميل
                errorDiv.classList.add('hidden');
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-75');
                btnText.innerText = 'جاري التحقق...';
                btnIcon.className = 'fas fa-spinner fa-spin';

                const identifier = document.getElementById('identifier').value.trim();
                const password = document.getElementById('password').value;

                try {
                    // البحث بذكاء: هل المدخل يطابق "اسم المستخدم" أو "رقم التواصل"
                    const user = await db.local_users.filter(u => {
                        const matchUsername = u.username && u.username.toLowerCase() === identifier.toLowerCase();
                        const matchPhone = u.phone && u.phone === identifier;
                        return matchUsername || matchPhone;
                    }).first();

                    if (user && user.password === password) {
                        
                        // تسجيل الجلسة محلياً في Dexie
                        await db.active_session.clear(); 
                        await db.active_session.add({
                            id: 1,
                            user_id: user.id,
                            login_time: new Date().toISOString()
                        });

                        // حفظ بيانات الجلسة في LocalStorage للوصول السريع
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userName', user.full_name);
                        localStorage.setItem('userRole', user.role);

                        // توجيه للوحة التحكم
                        btnText.innerText = 'تم الدخول بنجاح!';
                        btnIcon.className = 'fas fa-check';
                        submitBtn.classList.replace('bg-blue-600', 'bg-emerald-500');
                        
                        setTimeout(() => {
                            window.location.replace('dashboard.html');
                        }, 500);

                    } else {
                        // حالة الخطأ
                        errorText.innerText = 'البيانات غير صحيحة، تأكد من الاسم أو رقم الموبايل وكلمة المرور.';
                        errorDiv.classList.remove('hidden');
                        resetButton();
                    }
                } catch (err) {
                    errorText.innerText = 'فشل الاتصال بقاعدة البيانات المحلية!';
                    errorDiv.classList.remove('hidden');
                    resetButton();
                }
            });

            function resetButton() {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75');
                btnText.innerText = 'دخول للنظام';
                btnIcon.className = 'fas fa-arrow-left';
            }
        });
    </script>
</body>
</html>
