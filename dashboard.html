<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="assets/img/smalicon.png">
    <title>MENTRA ERP | النظام المحاسبي المتكامل</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        
        :root { --accent: #3b82f6; --accent-glow: rgba(59, 130, 246, 0.4); }
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; color: #0f172a; overflow: hidden; }
        
        /* Sidebar Glass UI */
        #sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        .nav-btn { transition: all 0.2s ease; border-right: 3px solid transparent; }
        .nav-btn:hover { background: rgba(255,255,255,0.05); border-right-color: rgba(255,255,255,0.2); transform: translateX(-4px); }
        
        .nav-btn.active-tab { 
            background: linear-gradient(90deg, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 100%); 
            border-right-color: var(--accent); 
            color: white; 
            font-weight: 700; 
        }
        .nav-btn.active-tab i { color: #60a5fa; text-shadow: 0 0 10px var(--accent-glow); }
        
        /* Glassmorphism Header */
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        
        /* Animations */
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .module-enter { animation: fadeSlideUp 0.4s ease-out forwards; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @media (max-width: 768px) {
            #sidebar { transform: translateX(100%); position: fixed; height: 100%; box-shadow: -10px 0 25px rgba(0,0,0,0.5); }
            #sidebar.active { transform: translateX(0); }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>

    <aside id="sidebar" class="w-72 bg-[#0b1120] text-slate-400 flex flex-col border-l border-slate-800 shrink-0">
        <div class="h-20 flex items-center justify-between px-6 border-b border-slate-800/60 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/30 transform rotate-3">
                    <i class="fas fa-chart-line text-xl"></i>
                </div>
                <div>
                    <span class="text-white font-black text-2xl tracking-tighter block">Mentra</span>
                    <span class="text-[9px] font-bold text-blue-500 uppercase tracking-[0.2em] opacity-80 leading-none">Enterprise ERP</span>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-white transition"><i class="fas fa-times text-xl"></i></button>
        </div>

        <nav id="nav-container" class="flex-1 py-6 px-4 space-y-1.5 overflow-y-auto"></nav>

        <div class="p-4 border-t border-slate-800/60 bg-slate-900/50 shrink-0">
            <div class="flex items-center gap-3 mb-4 px-2">
                <div class="relative">
                    <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center text-white font-bold border border-slate-600 shadow-inner" id="user-initial">U</div>
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 border-2 border-[#0b1120] rounded-full"></div>
                </div>
                <div class="overflow-hidden">
                    <p class="text-white font-bold text-sm truncate w-40" id="user-name">جاري التحميل...</p>
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-tight" id="user-role">مسؤول النظام</p>
                </div>
            </div>
            <button onclick="handleLogout()" class="w-full flex items-center justify-center gap-2 p-2.5 text-rose-400 hover:bg-rose-500/10 border border-transparent hover:border-rose-500/20 rounded-xl transition font-bold text-xs uppercase tracking-widest">
                <i class="fas fa-power-off"></i> إنهاء الجلسة
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-[#f8fafc] relative">
        <header class="h-20 glass-header flex items-center justify-between px-6 lg:px-10 absolute top-0 w-full z-30">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-slate-600 hover:text-blue-600 transition p-2 rounded-lg bg-slate-100"><i class="fas fa-bars text-lg"></i></button>
                <div class="flex flex-col">
                    <h2 id="page-title" class="font-bold text-2xl text-slate-800 leading-tight">الرئيسية</h2>
                    <span id="page-subtitle" class="text-xs text-slate-500 font-semibold italic">Mentra ERP System</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="storage-status" class="hidden sm:flex flex-col items-end">
                    <span id="storage-label" class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Local Storage</span>
                    <span id="storage-indicator" class="text-[10px] font-bold text-blue-600">-- MB Used</span>
                </div>
                <div class="h-8 w-[1px] bg-slate-200 hidden sm:block mx-2"></div>
                <div class="flex items-center gap-2 text-sm font-bold text-slate-600 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-200">
                    <i class="far fa-calendar-alt text-blue-500"></i>
                    <span id="system-date"></span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto pt-24 px-4 md:px-10 pb-10" id="main-scroll-area">
            <div id="main-content-display" class="w-full h-full max-w-7xl mx-auto module-enter"></div>
        </div>
    </main>

    <script src="assets/js/db-init.js"></script>
    <script>
        // --- 1. CONFIG & RBAC ---
        const RBAC_Matrix = {
            'main': { roles: ['admin', 'manager'], title: 'لوحة التحكم', icon: 'fa-th-large', desc: 'نظرة عامة على النظام' },
            'sales': { roles: ['admin', 'manager', 'cashier'], title: 'كاشير المبيعات', icon: 'fa-cash-register', desc: 'نقاط البيع السريعة POS' },
            'sales_report': { roles: ['admin', 'manager'], title: 'سجل المبيعات', icon: 'fa-file-invoice', desc: 'تقارير المبيعات التفصيلية' },
            'purchases': { roles: ['admin', 'manager'], title: 'فاتورة مشتريات', icon: 'fa-shopping-cart', desc: 'إدارة المشتريات والموردين' },
            'purchases_report': { roles: ['admin', 'manager'], title: 'سجل المشتريات', icon: 'fa-history', desc: 'أرشيف فواتير المشتريات' },
            'Inventory': { roles: ['admin', 'manager'], title: 'المخازن والجرد', icon: 'fa-boxes-stacked', desc: 'إدارة الأصناف والمستودعات' },
            'accounts': { roles: ['admin'], title: 'دليل الحسابات', icon: 'fa-users-cog', desc: 'إدارة شجرة الحسابات' },
            'journal': { roles: ['admin'], title: 'القيود اليومية', icon: 'fa-book', desc: 'قيود اليومية المحاسبية' },
            'system_info': { roles: ['admin'], title: 'بيانات النظام', icon: 'fa-database', desc: 'حالة قاعدة البيانات والنسخ الاحتياطي' },
            'settings': { roles: ['admin', 'manager'], title: 'إعدادات المستخدم', icon: 'fa-cog', desc: 'تخصيص واجهة المستخدم' }
        };

        // Static Local Auth (Using your existing login logic)
        const userSession = {
            isLoggedIn: localStorage.getItem('isLoggedIn') === 'true',
            name: localStorage.getItem('userName') || 'مستخدم غير معروف',
            role: 'admin' // Default to admin for ERP logic
        };

        if (!userSession.isLoggedIn) {
            window.location.replace('login.html');
        }

        // --- 2. UI ENGINE ---
        function initUI() {
            // Setup Identity
            document.getElementById('user-name').innerText = userSession.name;
            document.getElementById('user-initial').innerText = userSession.name.charAt(0);
            document.getElementById('system-date').innerText = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            // Build Navigation
            const nav = document.getElementById('nav-container');
            let lastGroup = '';
            
            nav.innerHTML = Object.entries(RBAC_Matrix).map(([id, config]) => {
                let header = '';
                // Logic to add section headers (Optional but clean)
                if (id === 'sales') header = `<p class="text-[10px] font-black text-slate-600 px-4 mt-6 mb-2 uppercase tracking-widest">العمليات التجارية</p>`;
                if (id === 'inventory') header = `<p class="text-[10px] font-black text-slate-600 px-4 mt-6 mb-2 uppercase tracking-widest">المخازن والمالية</p>`;
                if (id === 'system_info') header = `<p class="text-[10px] font-black text-slate-600 px-4 mt-6 mb-2 uppercase tracking-widest">الإعدادات</p>`;
                if (id === 'main') header = `<p class="text-[10px] font-black text-slate-600 px-4 mb-2 uppercase tracking-widest">القائمة الرئيسية</p>`;

                return `
                    ${header}
                    <button onclick="executeModuleLoad('${id}', this)" id="btn-${id}" class="nav-btn w-full flex items-center gap-4 p-3.5 rounded-xl text-slate-400 text-sm font-bold">
                        <i class="fas ${config.icon} w-5 text-center text-lg opacity-80"></i> 
                        <span>${config.title}</span>
                    </button>
                `;
            }).join('');

            // Load Default
            executeModuleLoad('main', document.getElementById('btn-main'));
            updateStorageInfo();
        }

        async function executeModuleLoad(moduleId, btnElement) {
            const config = RBAC_Matrix[moduleId];
            
            // UI State
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            if(btnElement) btnElement.classList.add('active-tab');
            
            document.getElementById('page-title').innerText = config.title;
            document.getElementById('page-subtitle').innerText = config.desc;
            
            if(window.innerWidth < 768) toggleSidebar();

            const container = document.getElementById('main-content-display');
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center h-64 space-y-4">
                    <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
                    <p class="text-slate-400 font-bold text-xs uppercase tracking-widest animate-pulse">جاري مزامنة البيانات...</p>
                </div>`;

            try {
                const res = await fetch(`pages/${moduleId}.js?v=${Date.now()}`);
                if (!res.ok) throw new Error();
                const rawScript = await res.text();
                
                // Cleanup & Inject
                document.querySelectorAll('.dynamic-module-script').forEach(s => s.remove());
                container.classList.remove('module-enter');
                void container.offsetWidth; 
                container.classList.add('module-enter');

                const scriptEl = document.createElement('script');
                scriptEl.className = 'dynamic-module-script';
                scriptEl.text = `(() => { try { ${rawScript} } catch(e) { console.error("ERP Module Error:", e); } })();`;
                document.body.appendChild(scriptEl);
                updateStorageInfo();
            } catch (err) {
                container.innerHTML = `
                    <div class="text-center p-20 border-2 border-dashed border-slate-200 rounded-3xl">
                        <i class="fas fa-tools text-5xl text-slate-200 mb-4 block"></i>
                        <p class="text-slate-400 font-bold">القسم "${config.title}" قيد التطوير أو الملف مفقود.</p>
                    </div>`;
            }
        }

        // --- 3. UTILITIES ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function updateStorageInfo() {
            if (navigator.storage && navigator.storage.estimate) {
                navigator.storage.estimate().then(est => {
                    const used = (est.usage / (1024 * 1024)).toFixed(2);
                    document.getElementById('storage-indicator').innerText = `${used} MB مستخدم`;
                });
            }
        }

        async function handleLogout() {
            const result = await Swal.fire({
                title: 'تسجيل الخروج',
                text: "هل تريد إنهاء جلسة العمل الحالية؟",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم، خروج',
                cancelButtonText: 'إلغاء',
                background: '#0b1120',
                color: '#fff',
                confirmButtonColor: '#3b82f6',
                cancelButtonColor: '#ef4444'
            });

            if (result.isConfirmed) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userName');
                window.location.replace('login.html');
            }
        }

        // Boot
        document.addEventListener('DOMContentLoaded', initUI);
    </script>
</body>
</html>
