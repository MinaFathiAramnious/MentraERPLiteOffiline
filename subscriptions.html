<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ابدأ رحلتك مع Mentra Lite (نسخة محلية)</title>
    
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="assets/js/db-init.js"></script>

    <link rel="icon" href="assets/img/smalicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>
<script type="text/babel">
    const { useState } = React;

    function SubscriptionPage() {
        const [formData, setFormData] = useState({
            full_name: '', // هذا سنعتبره "اسم المشروع"
            username: '',
            password: '',
            phone: ''
        });
        const [loading, setLoading] = useState(false);
        const [status, setStatus] = useState({ type: '', msg: '' });

        const handleSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            setStatus({ type: '', msg: '' });

            try {
                // 1. التأكد من أن اسم المستخدم غير مكرر محلياً
                const existingUser = await db.local_users.where("username").equals(formData.username).first();
                
                if (existingUser) {
                    setStatus({ type: 'error', msg: 'اسم المستخدم مسجل مسبقاً على هذا الجهاز' });
                    setLoading(false);
                    return;
                }

                // 2. إضافة المستخدم لجدول local_users
                const userId = await db.local_users.add({
                    full_name: formData.full_name,
                    username: formData.username,
                    password: formData.password,
                    phone: formData.phone,
                    role: 'admin',
                    created_at: new Date()
                });

                // 3. تخزين "اسم المشروع" في جدول الإعدادات settings
                // لكي يظهر في الفواتير والتقارير لاحقاً
                await db.table('settings').put({
                    id: 1,
                    project_name: 'MentraERPLite', // الاسم التقني
                    shop_name: formData.full_name,  // الاسم الذي أدخله المستخدم
                    phone: formData.phone,
                    currency: 'EGP',
                    tax_rate: 0
                });

                // 4. إنشاء جلسة دخول نشطة فورية
                await db.active_session.put({
                    id: 1,
                    user_id: userId,
                    login_time: new Date()
                });

                setStatus({ type: 'success', msg: 'تم إعداد نظامك المحلي بنجاح!' });
                
                // توجيه للداشبورد مباشرة لأننا سجلنا الدخول فعلياً
                setTimeout(() => window.location.href = 'dashboard.html', 1500);

            } catch (err) {
                console.error(err);
                setStatus({ type: 'error', msg: 'فشل حفظ البيانات في المتصفح' });
            } finally {
                setLoading(false);
            }
        };

        return (
            <div className="min-h-screen flex items-center justify-center p-4 text-right">
                <div className="max-w-md w-full glass-card rounded-[3rem] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-500">
                    {/* Header */}
                    <div className="bg-slate-900 p-8 text-center text-white relative">
                        <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                            <i className="fas fa-rocket text-2xl animate-pulse"></i>
                        </div>
                        <h2 className="text-2xl font-black italic">إعداد مشروعك الجديد 🚀</h2>
                        <p className="text-slate-400 text-[10px] mt-2 font-bold uppercase tracking-widest">جميع البيانات ستبقى على جهازك فقط</p>
                    </div>

                    {/* Form */}
                    <form onSubmit={handleSubmit} className="p-8 space-y-5">
                        {status.msg && (
                            <div className={`p-4 rounded-2xl text-xs font-black flex items-center gap-2 ${status.type === 'success' ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}`}>
                                <i className={`fas ${status.type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}`}></i>
                                {status.msg}
                            </div>
                        )}

                        <div className="space-y-4">
                            <InputField 
                                icon="fa-briefcase" label="اسم المشروع / المحل" 
                                placeholder="مثلاً: منارة للبرمجيات" 
                                value={formData.full_name}
                                onChange={(val) => setFormData({...formData, full_name: val})}
                            />
                            <InputField 
                                icon="fa-user-shield" label="اسم المدير (أدمن)" 
                                placeholder="admin" 
                                value={formData.username}
                                onChange={(val) => setFormData({...formData, username: val})}
                            />
                            <InputField 
                                icon="fa-phone" label="رقم التواصل" 
                                placeholder="01xxxxxxxxx" 
                                value={formData.phone}
                                onChange={(val) => setFormData({...formData, phone: val})}
                            />
                            <InputField 
                                icon="fa-lock" label="كلمة السر" 
                                type="password" placeholder="••••••••" 
                                value={formData.password}
                                onChange={(val) => setFormData({...formData, password: val})}
                            />
                        </div>

                        <button 
                            disabled={loading}
                            className={`w-full py-5 rounded-[2rem] font-black text-lg shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3 ${loading ? 'bg-slate-300' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-blue-200'}`}
                        >
                            {loading ? 'جاري تهيئة النظام...' : 'بدء الاستخدام مجاناً'}
                        </button>

                        <div className="bg-blue-50 p-3 rounded-xl border border-blue-100">
                             <p className="text-center text-[9px] text-blue-600 font-bold leading-relaxed">
                                <i className="fas fa-shield-alt ml-1"></i>
                                ملاحظة: بما أن النظام "أوفلاين"، لا يمكن استرجاع كلمة السر إذا ضاعت، احفظها جيداً.
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        );
    }

    // مكون حقل الإدخال كما هو مع تعديل اتجاه النص
    const InputField = ({ icon, label, placeholder, type = "text", value, onChange }) => (
        <div>
            <label className="block text-[10px] font-black text-slate-400 mb-2 mr-3 uppercase">{label}</label>
            <div className="relative">
                <i className={`fas ${icon} absolute right-5 top-1/2 -translate-y-1/2 text-slate-300`}></i>
                <input 
                    required
                    type={type}
                    value={value}
                    onChange={(e) => onChange(e.target.value)}
                    className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-4 pr-12 pl-4 transition-all font-bold text-slate-700 outline-none text-right"
                    placeholder={placeholder}
                />
            </div>
        </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SubscriptionPage />);
</script>
</body>
</html>
